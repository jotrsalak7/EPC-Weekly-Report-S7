        .btn{padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;transition:all 0.2s;border:none;display:inline-flex;align-items:center;gap:8px;font-size:14px}
        
        .btn-secondary{background:#f1f5f9;color:#475569}
        .btn-danger{background:#fef2f2;color:#dc2626}
        .btn-sm{padding:6px 12px;font-size:12px}
        .btn-xs{padding:4px 8px;font-size:11px}

        .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

        .status-dot.yellow{background:#f59e0b}

    SHEETS_API_URL: 'https://script.google.com/macros/s/AKfycbxUR6tFXB43Dt5oLWK041LKn26D6YAQvpSorGoNRVeUKx8G-sZXOktXXEZoISECpet1/exec',

// ============================================================
// Cloud badge state (top-right of header)
// ============================================================
const CloudBadge = ({status, lastSync}) => {
    const cfg = {
        synced: {label: 'Cloud synced', cls: ''},
        syncing: {label: 'Syncing...', cls: 'syncing'},
        offline: {label: 'Offline (local only)', cls: 'offline'},

            <span className="pulse"></span>{cfg.label}
        </span>
    );
};

// ============================================================
// CloudService — Cloudinary upload + URL-based photo storage
// ============================================================
const CloudService = {
    isConfigured() {
        return CONFIG.CLOUDINARY_CLOUD_NAME && CONFIG.CLOUDINARY_CLOUD_NAME !== 'YOUR_CLOUD_NAME';
    },
    openWidget(onSuccess, onError) {
        if (!this.isConfigured()) {
            onError && onError(new Error('Cloudinary not configured. Edit CONFIG.CLOUDINARY_CLOUD_NAME in the HTML.'));
            return;
        }
        if (!window.cloudinary) {
            onError && onError(new Error('Cloudinary widget not loaded. Check internet connection.'));
            return;
        }
        const widget = window.cloudinary.createUploadWidget({
            cloudName: CONFIG.CLOUDINARY_CLOUD_NAME,
            uploadPreset: CONFIG.CLOUDINARY_UPLOAD_PRESET,
            folder: CONFIG.CLOUDINARY_FOLDER,
            sources: ['local', 'camera', 'url'],
            multiple: false,
            maxFileSize: 10000000, // 10MB cap
            clientAllowedFormats: ['image', 'pdf'],
            styles: {
                palette: {
                    window: '#FFFFFF',
                    windowBorder: '#E2E8F0',
                    tabIcon: '#0F766E',
                    link: '#0F766E',
                    action: '#0F766E',
                    inactiveTabIcon: '#64748B',
                    error: '#DC2626',
                    inProgress: '#14B8A6',
                    complete: '#16A34A',
                    sourceBg: '#F8FAFC'
                }
            }
        }, (err, result) => {
            if (err) { onError && onError(err); return; }
            if (result && result.event === 'success') {
                onSuccess({
                    url: result.info.secure_url,
                    publicId: result.info.public_id,
                    name: result.info.original_filename + '.' + result.info.format,
                    uploadedAt: new Date().toISOString(),
                    format: result.info.format,
                    bytes: result.info.bytes,
                    width: result.info.width,
                    height: result.info.height
                });
            }
        });
        widget.open();
    },
    getThumbnail(url, w=200) {
        if (!url) return '';
        // Cloudinary on-the-fly transform: w_200,c_fill,q_auto,f_auto
        return url.replace('/upload/', `/upload/w_${w},c_fill,q_auto,f_auto/`);
    }
};

// ============================================================
// SheetsService — Google Sheets backend via Apps Script Web App
// Uses GET with base64-encoded JSON payload to avoid CORS preflight
// ============================================================
const SheetsService = {
    isConfigured() {
        return CONFIG.SHEETS_API_URL && !CONFIG.SHEETS_API_URL.startsWith('YOUR_');
    },
    async call(action, payload) {
        if (!this.isConfigured()) throw new Error('Sheets API not configured');
        const body = {action, token: CONFIG.SHEETS_API_TOKEN, payload};
        const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(body))));
        const url = `${CONFIG.SHEETS_API_URL}?data=${encodeURIComponent(b64)}&t=${Date.now()}`;
        const resp = await fetch(url, {method: 'GET', redirect: 'follow'});
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json();
        if (!json.ok) throw new Error(json.error || 'Unknown error');
        return json.data;
    },
    async loadAll() { return await this.call('loadAll', {}); },
    async saveProject(project) { return await this.call('saveProject', {project}); },
    async deleteProject(id) { return await this.call('deleteProject', {id}); },
    async saveReport(report) { return await this.call('saveReport', {report}); },
    async deleteReport(id) { return await this.call('deleteReport', {id}); },
    async bulkSync(data) { return await this.call('bulkSync', data); }
};

const AreaChartSVG=({data,height=180})=>{
    if(!data||data.length===0)return<div style={{textAlign:'center',color:'#94a3b8',padding:30}}>No data</div>;
    const w=100,p={top:20,right:10,bottom:25,left:12},cW=w-p.left-p.right,cH=height-p.top-p.bottom;
    const maxV=Math.max(...data.flatMap(d=>[d.baseline||0,d.actual||0]),100);
    const getX=(i)=>p.left+(i/Math.max(data.length-1,1))*cW;
    const getY=(v)=>p.top+cH-(v/maxV)*cH;
    const actualPath=data.map((d,i)=>`${i===0?'M':'L'}${getX(i)},${getY(d.actual||0)}`).join(' ');
    const baselinePath=data.map((d,i)=>`${i===0?'M':'L'}${getX(i)},${getY(d.baseline||0)}`).join(' ');
    const actualArea=`${actualPath} L${getX(data.length-1)},${p.top+cH} L${p.left},${p.top+cH} Z`;
    return(
        <svg viewBox={`0 0 ${w} ${height}`} style={{width:'100%',height}}>
            <defs><linearGradient id="aG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#0d9488" stopOpacity="0.4"/><stop offset="100%" stopColor="#0d9488" stopOpacity="0"/></linearGradient></defs>

// Cash Flow Performance Indicator Component
const CashFlowIndicator=({label,value,unit='',threshold,inverse=false,formula})=>{

            status=value<=threshold.green?'green':value<=threshold.yellow?'yellow':'red';

            status=value>=threshold.green?'green':value>=threshold.yellow?'yellow':'red';

    const emoji=status==='green'?'🟢':status==='yellow'?'🟡':'🔴';

    const gaugeColor=status==='Pass'?'#22c55e':status==='Warning'?'#f59e0b':'#ef4444';
    const angle=Math.min((actualRate/(targetRate*2))*180,180);
    
    return(
        <div style={{background:status==='Pass'?'#f0fdf4':status==='Warning'?'#fffbeb':'#fef2f2',padding:12,borderRadius:8,textAlign:'center'}}>

                <line x1="50" y1="55" x2={50+35*Math.cos((180-angle)*Math.PI/180)} y2={55-35*Math.sin((180-angle)*Math.PI/180)} stroke={gaugeColor} strokeWidth="2" strokeLinecap="round"/>
                <circle cx="50" cy="55" r="4" fill={gaugeColor}/>

            </div>
        </div>
    );
};

const MilestoneStatusChart=({metrics,title,type='schedule'})=>{
    const{total,completed,onTrack,atRisk,delayed}=metrics;
    if(total===0)return<div style={{textAlign:'center',color:'#94a3b8',padding:30}}>No milestone data</div>;
    
    const circumference=2*Math.PI*40;
    const completedPct=completed/total;
    const onTrackPct=onTrack/total;
    const atRiskPct=atRisk/total;
    const delayedPct=delayed/total;
    
    const completedDash=completedPct*circumference;
    const onTrackDash=onTrackPct*circumference;
    const atRiskDash=atRiskPct*circumference;
    const delayedDash=delayedPct*circumference;
    
    const color=type==='schedule'?'#8b5cf6':'#f59e0b';
    
    return(
        <div style={{background:'#f8fafc',padding:16,borderRadius:8,textAlign:'center'}}>
            <p style={{fontSize:12,fontWeight:700,marginBottom:12,color:color}}>{title}</p>

                <circle cx="50" cy="50" r="40" fill="none" stroke="#e2e8f0" strokeWidth="10"/>

                                    {d[line.key]>=1000000?(d[line.key]/1e6).toFixed(2)+'M':d[line.key]>=1000?(d[line.key]/1e3).toFixed(1)+'K':typeof d[line.key]==='number'?d[line.key].toFixed(2):d[line.key]||0}

                </div>

    lines.forEach(line=>{

    const minVal=Math.min(...allValues);
    const maxVal=Math.max(...allValues);
    const range=maxVal-minVal||1;

                <defs>
                    {lines.map((line,idx)=>(
                        <linearGradient key={idx} id={`grad-${line.key}`} x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stopColor={line.color} stopOpacity="0.3"/>
                            <stop offset="100%" stopColor={line.color} stopOpacity="0.05"/>
                        </linearGradient>
                    ))}
                </defs>
                
                {/* Grid lines */}
                {[0,0.25,0.5,0.75,1].map((pct,i)=>{
                    const y=p.top+chartH*pct;
                    const val=yMax-(yMax-yMin)*pct;
                    return(
                        <g key={i}>
                            <line x1={p.left} y1={y} x2={w-p.right} y2={y} stroke="#e2e8f0" strokeWidth="0.5"/>
                            <text x={p.left-4} y={y} fontSize="7" fill="#94a3b8" textAnchor="end" dominantBaseline="middle">
                                {val>=1000000?(val/1e6).toFixed(1)+'M':val>=1000?(val/1e3).toFixed(0)+'K':val.toFixed(2)}
                            </text>
                        </g>
                    );
                })}
                
                {/* Lines and areas */}
                {lines.map((line,idx)=>{
                    const points=data.map((d,i)=>({x:getX(i),y:getY(d[line.key]||0)}));
                    const pathD=points.map((pt,i)=>`${i===0?'M':'L'}${pt.x},${pt.y}`).join(' ');
                    const areaD=pathD+` L${points[points.length-1].x},${p.top+chartH} L${points[0].x},${p.top+chartH} Z`;
                    return(
                        <g key={idx}>
                            {line.fill&&<path d={areaD} fill={`url(#grad-${line.key})`}/>}
                            <path d={pathD} fill="none" stroke={line.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                            {points.map((pt,i)=><circle key={i} cx={pt.x} cy={pt.y} r="3" fill={line.color} stroke="white" strokeWidth="1"/>)}
                        </g>
                    );
                })}
                
                {/* X-axis labels */}
                {data.map((d,i)=>(

                {/* Y-axis label */}
                <text x={12} y={h/2} fontSize="8" fill="#64748b" textAnchor="middle" transform={`rotate(-90,12,${h/2})`}>{yLabel}</text>

            <div style={{display:'flex',justifyContent:'center',gap:12,marginTop:8,flexWrap:'wrap'}}>
                {lines.map((line,idx)=>(

                        <span style={{width:12,height:3,background:line.color,borderRadius:2}}></span>
                        {line.label}
                    </span>
                ))}
            </div>
        </div>

};

const TrendBarChart=({data,bars,title,height=180})=>{

                <div style={{textAlign:'center',padding:'10px'}}>
                    <p style={{fontSize:10,color:'#64748b',marginBottom:8}}>{d.week}</p>
                    <div style={{display:'flex',justifyContent:'center',gap:12,flexWrap:'wrap'}}>
                        {bars.map((bar,idx)=>(
                            <div key={idx} style={{textAlign:'center',padding:'6px 10px',background:'white',borderRadius:6,border:`2px solid ${bar.color}`}}>
                                <p style={{fontSize:9,color:'#64748b'}}>{bar.label}</p>
                                <p style={{fontSize:14,fontWeight:700,color:bar.color}}>
                                    {d[bar.key]>=1000?(d[bar.key]/1e3).toFixed(1)+'K':d[bar.key]||0}
                                </p>
                            </div>
                        ))}
                    </div>
                    <p style={{fontSize:9,color:'#94a3b8',marginTop:10}}>📊 Trend akan tampil setelah 2+ data report</p>
                </div>
            </div>
        );
    }
    
    const w=300,h=height,p={top:25,right:20,bottom:35,left:45};
    const chartW=w-p.left-p.right;
    const chartH=h-p.top-p.bottom;
    
    let maxVal=0;
    bars.forEach(bar=>{
        data.forEach(d=>{if(d[bar.key]>maxVal)maxVal=d[bar.key];});
    });

    const groupW=chartW/data.length;
    const barW=(groupW-8)/bars.length;
    
    return(
        <div style={{background:'#f8fafc',padding:12,borderRadius:8}}>
            <p style={{fontSize:11,fontWeight:600,marginBottom:8,color:'#334155'}}>{title}</p>
            <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height}}>

                    const y=p.top+chartH*(1-pct);

                    return(
                        <g key={i}>
                            <line x1={p.left} y1={y} x2={w-p.right} y2={y} stroke="#e2e8f0" strokeWidth="0.5"/>

                                {val>=1000?(val/1e3).toFixed(0)+'K':val.toFixed(0)}
                            </text>
                        </g>
                    );
                })}
                
                {/* Bars */}
                {data.map((d,i)=>{
                    const groupX=p.left+i*groupW+4;
                    return(
                        <g key={i}>
                            {bars.map((bar,j)=>{
                                const barH=(d[bar.key]||0)/maxVal*chartH;
                                return(
                                    <rect key={j} x={groupX+j*barW} y={p.top+chartH-barH} width={barW-2} height={barH} fill={bar.color} rx="2"/>
                                );
                            })}
                            <text x={groupX+groupW/2-4} y={h-10} fontSize="7" fill="#64748b" textAnchor="middle">{d.week}</text>
                        </g>
                    );
                })}
            </svg>
            
            {/* Legend */}
            <div style={{display:'flex',justifyContent:'center',gap:12,marginTop:8,flexWrap:'wrap'}}>
                {bars.map((bar,idx)=>(
                    <span key={idx} style={{fontSize:9,display:'flex',alignItems:'center',gap:4}}>

                        {bar.label}
                    </span>
                ))}
            </div>
        </div>
    );
};

// Combined Line and Bar Chart
const TrendComboChart=({data,lines,bars,title,height=180})=>{
    if(!data||data.length===0)return<div style={{textAlign:'center',color:'#94a3b8',padding:40}}>No trend data available</div>;
    
    // Show data summary for single point
    if(data.length===1){
        const d=data[0];
        return(
            <div style={{background:'#f8fafc',padding:12,borderRadius:8}}>
                <p style={{fontSize:11,fontWeight:600,marginBottom:8,color:'#334155'}}>{title}</p>
                <div style={{textAlign:'center',padding:'10px'}}>
                    <p style={{fontSize:10,color:'#64748b',marginBottom:8}}>{d.week}</p>
                    <div style={{display:'flex',justifyContent:'center',gap:10,flexWrap:'wrap'}}>
                        {bars.map((bar,idx)=>(
                            <div key={`bar-${idx}`} style={{textAlign:'center',padding:'5px 8px',background:'white',borderRadius:6,border:`2px solid ${bar.color}`}}>
                                <p style={{fontSize:8,color:'#64748b'}}>{bar.label}</p>
                                <p style={{fontSize:12,fontWeight:700,color:bar.color}}>
                                    {d[bar.key]>=1e6?(d[bar.key]/1e6).toFixed(2)+'M':d[bar.key]>=1000?(d[bar.key]/1e3).toFixed(1)+'K':typeof d[bar.key]==='number'?d[bar.key].toFixed(2):d[bar.key]||0}
                                </p>
                            </div>
                        ))}
                        {lines.map((line,idx)=>(
                            <div key={`line-${idx}`} style={{textAlign:'center',padding:'5px 8px',background:'white',borderRadius:6,border:`2px solid ${line.color}`}}>
                                <p style={{fontSize:8,color:'#64748b'}}>{line.label}</p>
                                <p style={{fontSize:12,fontWeight:700,color:line.color}}>
                                    {typeof d[line.key]==='number'?d[line.key].toFixed(3):d[line.key]||0}
                                </p>
                            </div>
                        ))}
                    </div>
                    <p style={{fontSize:9,color:'#94a3b8',marginTop:10}}>📊 Trend akan tampil setelah 2+ data report</p>
                </div>
            </div>
        );
    }
    
    const w=300,h=height,p={top:25,right:45,bottom:35,left:45};
    const chartW=w-p.left-p.right;
    const chartH=h-p.top-p.bottom;
    
    // Bar scale (left axis)
    let maxBar=0;
    bars.forEach(bar=>{data.forEach(d=>{if(d[bar.key]>maxBar)maxBar=d[bar.key];});});
    maxBar=maxBar||1;
    
    // Line scale (right axis)
    let allLineVals=[];
    lines.forEach(line=>{data.forEach(d=>{if(d[line.key]!==undefined)allLineVals.push(d[line.key]);});});
    const minLine=Math.min(...allLineVals);
    const maxLine=Math.max(...allLineVals);
    const lineRange=maxLine-minLine||1;
    
    const groupW=chartW/data.length;
    const barW=(groupW-12)/bars.length;
    
    const getLineY=v=>p.top+chartH-(((v-minLine+lineRange*0.1)/(lineRange*1.2))*chartH);
    
    return(
        <div style={{background:'#f8fafc',padding:12,borderRadius:8}}>
            <p style={{fontSize:11,fontWeight:600,marginBottom:8,color:'#334155'}}>{title}</p>
            <svg viewBox={`0 0 ${w} ${h}`} style={{width:'100%',height}}>
                {/* Grid lines */}
                {[0,0.25,0.5,0.75,1].map((pct,i)=>{
                    const y=p.top+chartH*(1-pct);
                    const barVal=maxBar*pct;
                    const lineVal=minLine+(maxLine-minLine)*pct;
                    return(
                        <g key={i}>
                            <line x1={p.left} y1={y} x2={w-p.right} y2={y} stroke="#e2e8f0" strokeWidth="0.5"/>
                            <text x={p.left-4} y={y} fontSize="6" fill="#94a3b8" textAnchor="end" dominantBaseline="middle">
                                {barVal>=1e6?(barVal/1e6).toFixed(1)+'M':barVal>=1000?(barVal/1e3).toFixed(0)+'K':barVal.toFixed(0)}
                            </text>
                            <text x={w-p.right+4} y={y} fontSize="6" fill="#8b5cf6" textAnchor="start" dominantBaseline="middle">
                                {lineVal.toFixed(2)}
                            </text>
                        </g>
                    );
                })}
                
                {/* Bars */}
                {data.map((d,i)=>{
                    const groupX=p.left+i*groupW+6;
                    return(
                        <g key={i}>
                            {bars.map((bar,j)=>{
                                const barH=(d[bar.key]||0)/maxBar*chartH;
                                return<rect key={j} x={groupX+j*barW} y={p.top+chartH-barH} width={barW-2} height={barH} fill={bar.color} rx="2" opacity="0.7"/>;
                            })}
                        </g>
                    );
                })}
                
                {/* Lines */}
                {lines.map((line,idx)=>{
                    const points=data.map((d,i)=>({x:p.left+i*groupW+groupW/2,y:getLineY(d[line.key]||0)}));
                    const pathD=points.map((pt,i)=>`${i===0?'M':'L'}${pt.x},${pt.y}`).join(' ');
                    return(
                        <g key={idx}>
                            <path d={pathD} fill="none" stroke={line.color} strokeWidth="2.5" strokeLinecap="round"/>
                            {points.map((pt,i)=><circle key={i} cx={pt.x} cy={pt.y} r="4" fill={line.color} stroke="white" strokeWidth="1.5"/>)}
                        </g>
                    );
                })}
                
                {/* X-axis labels */}
                {data.map((d,i)=>(
                    <text key={i} x={p.left+i*groupW+groupW/2} y={h-10} fontSize="7" fill="#64748b" textAnchor="middle">{d.week}</text>
                ))}
            </svg>
            
            {/* Legend */}
            <div style={{display:'flex',justifyContent:'center',gap:10,marginTop:8,flexWrap:'wrap'}}>
                {bars.map((bar,idx)=>(
                    <span key={`bar-${idx}`} style={{fontSize:8,display:'flex',alignItems:'center',gap:3}}>
                        <span style={{width:10,height:10,background:bar.color,borderRadius:2}}></span>{bar.label}
                    </span>
                ))}
                {lines.map((line,idx)=>(
                    <span key={`line-${idx}`} style={{fontSize:8,display:'flex',alignItems:'center',gap:3}}>
                        <span style={{width:12,height:3,background:line.color,borderRadius:2}}></span>{line.label}
                    </span>
                ))}
            </div>
        </div>
    );
};

    const calculateScheduleDuration=(startDate,finishDate)=>{
        if(!startDate||!finishDate)return 0;

        return Math.ceil(diffTime/(1000*60*60*24));

        if(!startDate||!finishDate||!spi||spi<=0)return finishDate||'';

        const finish=new Date(finishDate);
        const totalDuration=Math.ceil((finish-start)/(1000*60*60*24));
        const estimatedDuration=Math.ceil(totalDuration/spi);
        const estimatedDate=new Date(start);
        estimatedDate.setDate(estimatedDate.getDate()+estimatedDuration);
        return estimatedDate.toISOString().split('T')[0];
    };

        const delayDays=Math.ceil(diffTime/(1000*60*60*24));
        return delayDays>0?delayDays:0;
    };

        const eacTypical=cpi>0?bac/cpi:0;
        const eacAtypical=acwp+(bac-bcwp);
        const eacCombined=(cpi>0&&spi>0)?acwp+(bac-bcwp)/(cpi*spi):0;
        const vac=bac-eacTypical;
        return{spiValue:spi,cpiValue:cpi,sv,cv,eac:eacTypical,eacTypical,eacAtypical,eacCombined,vac};

    const calculateCashFlowPerformance=(revenue,cashOut,billing,cashIn,weekNo=1)=>{
        // A. Cash Flow Balance = Cash In - Cash Out
        const cashFlowBalance=cashIn-cashOut;
        
        // B. Billing Coverage Ratio = Billing / Revenue (BCWP)
        const billingCoverageRatio=revenue>0?billing/revenue:0;
        
        // C. Cash Collection Ratio = Cash In / Billing
        const cashCollectionRatio=billing>0?cashIn/billing:0;
        
        // D. Cash Adequacy Ratio = Cash In / Cash Out
        const cashAdequacyRatio=cashOut>0?cashIn/cashOut:0;
        
        // E. Cash Burn Rate = Cash Out / Period (weeks)
        const cashBurnRate=weekNo>0?cashOut/weekNo:0;
        
        // F. Earned Cash Ratio (ECR) = Cash In / BCWP
        const earnedCashRatio=revenue>0?cashIn/revenue:0;
        
        // G. Billing Lag = BCWP - Billing
        const billingLag=revenue-billing;
        
        // H. Cash Gap = Cash Out - Cash In
        const cashGap=cashOut-cashIn;
        
        // Calculate Overall Score
        const scores=[];
        // Cash Flow Balance: >=0 is green
        scores.push(cashFlowBalance>=0?1:0);
        // Billing Coverage: >=0.95 is green, >=0.85 yellow
        scores.push(billingCoverageRatio>=0.95?1:billingCoverageRatio>=0.85?0.5:0);
        // Collection Ratio: >=0.9 is green, >=0.8 yellow
        scores.push(cashCollectionRatio>=0.9?1:cashCollectionRatio>=0.8?0.5:0);
        // Cash Adequacy: >=1.0 is green, >=0.9 yellow
        scores.push(cashAdequacyRatio>=1.0?1:cashAdequacyRatio>=0.9?0.5:0);
        
        const overallScore=scores.reduce((a,b)=>a+b,0)/scores.length;
        const overallStatus=overallScore>=0.75?'green':overallScore>=0.5?'yellow':'red';
        
        return{

    const calculateRisks=()=>{
        if(!selectedReport)return[];
        const risks=[],{evm,hse,quality,overallProgress,tkdn,milestonesSchedule,milestonesPayment}=selectedReport;
        const cfMetrics=getCashFlowMetrics(selectedReport);
        if(evm?.spiValue<0.95)risks.push({category:'Schedule',level:'High',description:`SPI ${evm.spiValue.toFixed(3)}`,recommendation:'Recovery schedule'});
        else if(evm?.spiValue<1.0)risks.push({category:'Schedule',level:'Medium',description:`SPI ${evm.spiValue.toFixed(3)}`,recommendation:'Monitor'});
        if(evm?.cpiValue<0.95)risks.push({category:'Cost',level:'High',description:`CPI ${evm.cpiValue.toFixed(2)}`,recommendation:'Cost control'});
        else if(evm?.cpiValue<1.0)risks.push({category:'Cost',level:'Medium',description:`CPI ${evm.cpiValue.toFixed(2)}`,recommendation:'Monitor'});
        if(cfMetrics?.overallStatus==='red')risks.push({category:'Cash Flow',level:'High',description:'Critical cash position',recommendation:'Immediate action needed'});
        else if(cfMetrics?.overallStatus==='yellow')risks.push({category:'Cash Flow',level:'Medium',description:'Cash flow at risk',recommendation:'Review billing & collection'});
        if(hse?.lagging?.lti>0)risks.push({category:'Safety',level:'High',description:`LTI: ${hse.lagging.lti}`,recommendation:'Safety stand-down'});
        // TKDN Risk Assessment
        if(tkdn?.plan>0 && tkdn?.actual>0){
            const tkdnRatio=tkdn.actual/tkdn.plan;
            if(tkdnRatio<0.9)risks.push({category:'TKDN',level:'High',description:`TKDN ${tkdn.actual.toFixed(1)}% vs Target ${tkdn.plan}% (Gap: ${(tkdn.actual-tkdn.plan).toFixed(1)}%)`,recommendation:'Increase local content sourcing, review supplier strategy'});
            else if(tkdnRatio<1.0)risks.push({category:'TKDN',level:'Medium',description:`TKDN ${tkdn.actual.toFixed(1)}% vs Target ${tkdn.plan}% (Gap: ${(tkdn.actual-tkdn.plan).toFixed(1)}%)`,recommendation:'Monitor local content progress, prepare mitigation'});
        }
        // Milestone Schedule Risk Assessment
        if(milestonesSchedule&&milestonesSchedule.length>0){
            const delayedMS=milestonesSchedule.filter(m=>m.status==='Delayed'||m.status==='Critical');
            const atRiskMS=milestonesSchedule.filter(m=>m.status==='At Risk');
            if(delayedMS.length>0){
                risks.push({category:'Milestone Schedule',level:'High',description:`${delayedMS.length} milestone(s) delayed: ${delayedMS.map(m=>m.description).join(', ')}`,recommendation:'Develop recovery plan, allocate additional resources'});
            }
            if(atRiskMS.length>0){
                risks.push({category:'Milestone Schedule',level:'Medium',description:`${atRiskMS.length} milestone(s) at risk: ${atRiskMS.map(m=>m.description).join(', ')}`,recommendation:'Monitor closely, prepare contingency'});
            }
            // Check milestones with forecast date later than plan date
            milestonesSchedule.forEach(m=>{
                if(m.planDate&&m.actualForecastDate&&m.status!=='Completed'){
                    const plan=new Date(m.planDate);
                    const forecast=new Date(m.actualForecastDate);
                    const diffDays=Math.ceil((forecast-plan)/(1000*60*60*24));
                    if(diffDays>30&&!risks.find(r=>r.category==='Milestone Schedule'&&r.level==='High')){
                        risks.push({category:'Milestone Schedule',level:'High',description:`"${m.description}" forecast ${diffDays} days behind plan`,recommendation:'Implement acceleration measures'});
                    }else if(diffDays>7&&diffDays<=30&&!risks.find(r=>r.category==='Milestone Schedule'&&r.level==='Medium'&&r.description.includes(m.description))){
                        risks.push({category:'Milestone Schedule',level:'Medium',description:`"${m.description}" forecast ${diffDays} days behind plan`,recommendation:'Monitor and prepare mitigation'});
                    }
                }
            });
        }
        // Milestone Payment Risk Assessment
        if(milestonesPayment&&milestonesPayment.length>0){
            const delayedMP=milestonesPayment.filter(m=>m.status==='Delayed'||m.status==='Critical'||m.status==='Overdue');
            const pendingMP=milestonesPayment.filter(m=>m.status==='Pending'||m.status==='At Risk');
            if(delayedMP.length>0){
                risks.push({category:'Milestone Payment',level:'High',description:`${delayedMP.length} payment milestone(s) delayed: ${delayedMP.map(m=>m.description).join(', ')}`,recommendation:'Escalate to management, follow up with client'});
            }
            if(pendingMP.length>0){
                risks.push({category:'Milestone Payment',level:'Medium',description:`${pendingMP.length} payment milestone(s) pending: ${pendingMP.map(m=>m.description).join(', ')}`,recommendation:'Ensure invoice submission, track approval status'});
            }
            // Check payment milestones with forecast/actual date later than plan
            milestonesPayment.forEach(m=>{
                if(m.planDate&&m.actualForecastDate&&m.status!=='Completed'){
                    const plan=new Date(m.planDate);
                    const forecast=new Date(m.actualForecastDate);
                    const diffDays=Math.ceil((forecast-plan)/(1000*60*60*24));
                    if(diffDays>14&&!risks.find(r=>r.category==='Milestone Payment'&&r.level==='High')){
                        risks.push({category:'Milestone Payment',level:'High',description:`"${m.description}" payment delayed ${diffDays} days - cash flow impact`,recommendation:'Urgent follow-up with client, review billing process'});
                    }else if(diffDays>7&&diffDays<=14&&!risks.find(r=>r.category==='Milestone Payment'&&r.level==='Medium'&&r.description.includes(m.description))){
                        risks.push({category:'Milestone Payment',level:'Medium',description:`"${m.description}" payment ${diffDays} days behind schedule`,recommendation:'Follow up invoice status'});
                    }
                }
            });
        }
        return risks.length>0?risks:[{category:'Overall',level:'Low',description:'Performance OK',recommendation:'Continue monitoring'}];
    };

    // Calculate Milestone Analysis Metrics
    const calculateMilestoneMetrics=(milestones,type='schedule')=>{
        if(!milestones||milestones.length===0)return{total:0,completed:0,onTrack:0,atRisk:0,delayed:0,completionRate:0,avgDelay:0};
        const total=milestones.length;
        const completed=milestones.filter(m=>m.status==='Completed').length;
        const onTrack=milestones.filter(m=>m.status==='On Track').length;
        const atRisk=milestones.filter(m=>m.status==='At Risk'||m.status==='Pending').length;
        const delayed=milestones.filter(m=>m.status==='Delayed'||m.status==='Critical'||m.status==='Overdue').length;
        const completionRate=total>0?(completed/total)*100:0;
        
        // Calculate average delay for non-completed milestones
        let totalDelay=0,delayCount=0;
        milestones.forEach(m=>{
            if(m.planDate&&m.actualForecastDate&&m.status!=='Completed'){
                const plan=new Date(m.planDate);
                const forecast=new Date(m.actualForecastDate);
                const diff=Math.ceil((forecast-plan)/(1000*60*60*24));
                if(diff>0){totalDelay+=diff;delayCount++;}
            }
        });
        const avgDelay=delayCount>0?totalDelay/delayCount:0;
        
        return{total,completed,onTrack,atRisk,delayed,completionRate,avgDelay};
    };

    // Generate Milestone Trend Data from Reports
    const generateMilestoneTrendFromReports=(currentReport,allReports,maxWeeks=6)=>{
        if(!currentReport||!allReports||allReports.length===0){
            return{schedule:[],payment:[]};
        }
        
        const projectReports=allReports
            .filter(r=>r.projectId===currentReport.projectId)
            .sort((a,b)=>(a.weekNo||0)-(b.weekNo||0));
        
        const currentIdx=projectReports.findIndex(r=>r.id===currentReport.id);
        const startIdx=Math.max(0,currentIdx-maxWeeks+1);
        const relevantReports=projectReports.slice(startIdx,currentIdx+1);
        
        if(relevantReports.length===0){
            return{schedule:[],payment:[]};
        }
        
        const scheduleTrend=relevantReports.map(r=>{
            const ms=r.milestonesSchedule||[];
            const metrics=calculateMilestoneMetrics(ms,'schedule');
            return{
                week:`W${r.weekNo||0}`,
                total:metrics.total,
                completed:metrics.completed,
                onTrack:metrics.onTrack,
                atRisk:metrics.atRisk,
                delayed:metrics.delayed,
                completionRate:metrics.completionRate
            };
        });
        
        const paymentTrend=relevantReports.map(r=>{
            const mp=r.milestonesPayment||[];
            const metrics=calculateMilestoneMetrics(mp,'payment');
            return{
                week:`W${r.weekNo||0}`,
                total:metrics.total,
                completed:metrics.completed,
                onTrack:metrics.onTrack,
                atRisk:metrics.atRisk,
                delayed:metrics.delayed,
                completionRate:metrics.completionRate
            };
        });
        
        return{schedule:scheduleTrend,payment:paymentTrend};
    };

    const renderProjects=()=>(<div><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}><h1 style={{fontSize:24,fontWeight:800}}>Projects</h1><button className="btn btn-primary" onClick={()=>{setFormData({});setEditingId(null);setShowModal('project');}}><Icons.Plus/> Add</button></div><div className="grid-2">{projects.map(p=>(<div key={p.id} className="card"><div style={{background:'linear-gradient(135deg,#0d9488,#0f766e)',padding:16,color:'white'}}><h3 style={{fontSize:16,fontWeight:700}}>{p.name}</h3><p style={{opacity:0.9,fontSize:12}}>{p.contractor}</p></div><div style={{padding:16}}><div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,fontSize:12,marginBottom:12}}><div><span style={{color:'#64748b'}}>Owner:</span><br/><strong>{p.owner}</strong></div><div><span style={{color:'#64748b'}}>BAC:</span><br/><strong>${((p.bac||p.contractPrice||0)/1e6).toFixed(2)}M</strong></div></div><div style={{display:'flex',gap:8}}><button className="btn btn-secondary btn-sm" style={{flex:1}} onClick={()=>{setFormData(p);setEditingId(p.id);setShowModal('project');}}><Icons.Edit/> Edit</button><button className="btn btn-danger btn-sm" onClick={()=>{if(confirm('Delete?'))setProjects(projects.filter(x=>x.id!==p.id));}}><Icons.Delete/></button></div></div></div>))}</div></div>);

    const renderReports=()=>(<div><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}><h1 style={{fontSize:24,fontWeight:800}}>Weekly Reports</h1><button className="btn btn-primary" onClick={()=>{setFormData({projectId:projects[0]?.id,weekNo:(reports.length>0?Math.max(...reports.map(r=>r.weekNo))+1:1),docNo:`RPT${String((reports.length>0?Math.max(...reports.map(r=>r.weekNo))+1:1)).padStart(4,'0')}`,hse:defaultHSE,thisWeekActivities:defaultActivities,nextWeekPlan:defaultActivities,milestonesSchedule:[],milestonesPayment:[],cashFlow:defaultCashFlow,tkdn:defaultTKDN});setEditingId(null);setActiveTab('general');setShowModal('report');}}><Icons.Plus/> Create</button></div>{reports.map(r=>{const proj=projects.find(p=>p.id===r.projectId);const cfm=getCashFlowMetrics(r);return(<div key={r.id} className="card" style={{padding:16,marginBottom:12}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div style={{display:'flex',alignItems:'center',gap:12}}><div style={{width:44,height:44,borderRadius:10,background:'linear-gradient(135deg,#0d9488,#0f766e)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:800,fontSize:16}}>{r.weekNo}</div><div><h3 style={{fontWeight:700,fontSize:14}}>{r.docNo}</h3><p style={{color:'#64748b',fontSize:12}}>{proj?.name}</p></div></div><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:12}}><span className={`status-dot ${cfm?.overallStatus||'green'}`} style={{width:8,height:8}}/></span><span className={`badge ${r.status==='Issued'?'badge-success':'badge-warning'}`}>{r.status}</span><button className="btn btn-secondary btn-xs" onClick={()=>{setViewReportData(r);setShowModal('viewReport');}} title="View Report Data"><Icons.Eye/> View</button><button className="btn btn-secondary btn-xs" onClick={()=>{setFormData({...r,hse:r.hse||defaultHSE,thisWeekActivities:r.thisWeekActivities||defaultActivities,nextWeekPlan:r.nextWeekPlan||defaultActivities,cashFlow:r.cashFlow||defaultCashFlow,tkdn:r.tkdn||defaultTKDN});setEditingId(r.id);setActiveTab('general');setShowModal('report');}} title="Edit Report"><Icons.Edit/></button><button className="btn btn-secondary btn-xs" onClick={()=>copyReport(r)} title="Duplicate"><Icons.Copy/></button><button className="btn btn-danger btn-xs" onClick={()=>deleteReport(r.id)} title="Delete"><Icons.Delete/></button></div></div></div>);})}</div>);

        const msScheduleMetrics=calculateMilestoneMetrics(msSchedule,'schedule');

        const q=selectedReport?.quality||{};
        const so=q.siteOffice||{};

                <div className="stat-card" style={{background:'linear-gradient(135deg,#fdf2f8,#fce7f3)'}}>
                    <p style={{fontSize:12,color:'#be185d',fontWeight:600}}>Cash Flow</p>
                    <p style={{fontSize:20,fontWeight:800,color:cfm?.overallStatus==='green'?'#16a34a':cfm?.overallStatus==='yellow'?'#f59e0b':'#dc2626'}}>{cfm?.overallStatus==='green'?'HEALTHY':cfm?.overallStatus==='yellow'?'AT RISK':'CRITICAL'}</p>
                    <p style={{fontSize:10,color:'#64748b'}}>Score: {((cfm?.overallScore||0)*100).toFixed(0)}%</p>

                <div className="stat-card" style={{background:'linear-gradient(135deg,#f0f9ff,#dbeafe)'}}>
                    <p style={{fontSize:12,color:'#2563eb',fontWeight:600}}>🦺 Safety</p>

        setExportingPDF(true);
        setPdfProgress('Preparing...');
        
        try {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pageWidth = pdf.internal.pageSize.getWidth(); // 210mm
            const pageHeight = pdf.internal.pageSize.getHeight(); // 297mm
            
            // Optimized margins to prevent content cutoff
            const marginLeft = 10;
            const marginRight = 10;
            const marginTop = 25; // Space for header
            const marginBottom = 12; // Space for footer
            const headerHeight = 20;
            
            const contentWidth = pageWidth - marginLeft - marginRight; // 190mm
            const contentHeight = pageHeight - marginTop - marginBottom; // 260mm
            
            // Store current menu
            const currentMenu = activeMenu;
            
            // Store all pages data for proper numbering
            let allPagesData = [];
            
            // Function to expand all scrollable areas before capture
            const expandScrollableAreas = () => {
                // Target both elements with pdf-expand-area class and elements with overflow styles
                const scrollables = document.querySelectorAll('.main-content .pdf-expand-area, .main-content [style*="overflow"], .main-content [style*="max-height"]');
                const savedStyles = [];
                scrollables.forEach((el, idx) => {
                    savedStyles.push({
                        element: el,
                        maxHeight: el.style.maxHeight,
                        overflow: el.style.overflow,
                        overflowY: el.style.overflowY,
                        overflowX: el.style.overflowX
                    });
                    el.style.maxHeight = 'none';
                    el.style.overflow = 'visible';
                    el.style.overflowY = 'visible';
                    el.style.overflowX = 'visible';
                });
                return savedStyles;
            };
            
            // Function to restore scrollable areas
            const restoreScrollableAreas = (savedStyles) => {
                savedStyles.forEach(item => {
                    item.element.style.maxHeight = item.maxHeight;
                    item.element.style.overflow = item.overflow;
                    item.element.style.overflowY = item.overflowY;
                    item.element.style.overflowX = item.overflowX;
                });
            };
            
            // Function to capture a page
            const capturePage = async (menuName, title) => {
                setPdfProgress('Capturing ' + title + '...');
                setActiveMenu(menuName);
                
                // Wait for render
                await new Promise(resolve => setTimeout(resolve, 800));
                
                // Expand scrollable areas before capture
                const savedStyles = expandScrollableAreas();
                
                // Wait a bit for reflow
                await new Promise(resolve => setTimeout(resolve, 200));
                
                const content = document.querySelector('.main-content');
                if (!content) {
                    restoreScrollableAreas(savedStyles);
                    return null;
                }
                
                const canvas = await html2canvas(content, {
                    scale: 2,
                    useCORS: true,
                    logging: false,
                    backgroundColor: '#f8fafc',
                    windowWidth: 1200,
                    windowHeight: content.scrollHeight + 100
                });
                
                // Restore scrollable areas
                restoreScrollableAreas(savedStyles);
                
                return canvas;
            };
            
            // Add header to PDF
            const addHeader = (title) => {
                pdf.setFillColor(15, 118, 110);
                pdf.rect(0, 0, pageWidth, headerHeight, 'F');
                pdf.setTextColor(255, 255, 255);
                pdf.setFontSize(12);
                pdf.setFont('helvetica', 'bold');
                pdf.text('EPC Weekly Report - ' + title, marginLeft, 13);
                pdf.setFontSize(9);
                pdf.setFont('helvetica', 'normal');
                pdf.text('Week ' + (selectedReport?.weekNo || ''), pageWidth - marginRight - 20, 13);
                pdf.setTextColor(0, 0, 0);
            };
            
            // Add footer to PDF
            const addFooter = (pageNum, totalPages) => {
                const footerY = pageHeight - 5;
                pdf.setFontSize(7);
                pdf.setTextColor(100, 100, 100);
                pdf.text(selectedProject?.name || 'EPC Project', marginLeft, footerY);
                pdf.text('Page ' + pageNum + ' of ' + totalPages, pageWidth - marginRight - 15, footerY);
                pdf.text(new Date().toLocaleDateString(), pageWidth / 2, footerY, { align: 'center' });
            };
            
            // Function to crop canvas for pagination
            const cropCanvas = (sourceCanvas, startY, height) => {
                const croppedCanvas = document.createElement('canvas');
                const ctx = croppedCanvas.getContext('2d');
                croppedCanvas.width = sourceCanvas.width;
                croppedCanvas.height = Math.ceil(height);
                ctx.fillStyle = '#f8fafc';
                ctx.fillRect(0, 0, croppedCanvas.width, croppedCanvas.height);
                ctx.drawImage(
                    sourceCanvas, 
                    0, Math.floor(startY), sourceCanvas.width, Math.ceil(height), 
                    0, 0, sourceCanvas.width, Math.ceil(height)
                );
                return croppedCanvas;
            };
            
            // Function to prepare pages data from canvas
            const preparePages = (canvas, title) => {
                // Calculate scale factor: canvas is at 2x, we want to fit contentWidth (190mm)
                const scaleFactor = contentWidth / (canvas.width / 2);
                // How many canvas pixels fit in one PDF page content area
                const canvasHeightPerPage = (contentHeight / scaleFactor) * 2;
                
                let yOffset = 0;
                let pages = [];
                
                while (yOffset < canvas.height) {
                    const remainingHeight = canvas.height - yOffset;
                    const heightForThisPage = Math.min(canvasHeightPerPage, remainingHeight);
                    
                    const croppedCanvas = cropCanvas(canvas, yOffset, heightForThisPage);
                    const imgData = croppedCanvas.toDataURL('image/jpeg', 0.92);
                    const croppedHeight = (heightForThisPage / 2) * scaleFactor;
                    
                    pages.push({
                        title: title,
                        imgData: imgData,
                        width: contentWidth,
                        height: croppedHeight
                    });
                    
                    yOffset += heightForThisPage;
                }
                
                return pages;
            };
            
            // Capture and prepare all pages
            if (pageType === 'dashboard' || pageType === 'both') {
                const dashCanvas = await capturePage('dashboard', 'Dashboard');
                if (dashCanvas) {
                    const dashPages = preparePages(dashCanvas, 'Dashboard');
                    allPagesData = allPagesData.concat(dashPages);
                }
            }
            
            if (pageType === 'analysis' || pageType === 'both') {
                const analysisCanvas = await capturePage('analysis', 'Risk Analysis');
                if (analysisCanvas) {
                    const analysisPages = preparePages(analysisCanvas, 'Risk Analysis & Trend');
                    allPagesData = allPagesData.concat(analysisPages);
                }
            }
            
            // Render all pages with correct numbering
            setPdfProgress('Generating PDF pages...');
            const totalPages = allPagesData.length;
            
            allPagesData.forEach((pageData, index) => {
                if (index > 0) {
                    pdf.addPage();
                }
                
                addHeader(pageData.title);
                pdf.addImage(pageData.imgData, 'JPEG', marginLeft, marginTop, pageData.width, pageData.height);
                addFooter(index + 1, totalPages);
            });
            
            // Restore original menu
            setActiveMenu(currentMenu);
            
            // Save PDF
            setPdfProgress('Saving PDF...');
            const fileName = 'EPC_Report_Week' + (selectedReport?.weekNo || '') + '_' + pageType + '_' + new Date().toISOString().split('T')[0] + '.pdf';
            pdf.save(fileName);
            
            showNotif('PDF exported successfully!');
        } catch (error) {
            console.error('PDF Export Error:', error);
            showNotif('Export failed: ' + error.message, 'error');
        } finally {
            setExportingPDF(false);
            setPdfProgress('');
        }
    };

        const cfm=getCashFlowMetrics(r);
        const cf=cfm||defaultCashFlow;
        
        return(<div className="modal-overlay" onClick={()=>{setShowModal(null);setViewReportData(null);}}><div className="modal" style={{maxWidth:1000}} onClick={e=>e.stopPropagation()}><div style={{padding:16,borderBottom:'1px solid #e2e8f0',display:'flex',justifyContent:'space-between',alignItems:'center',background:'linear-gradient(135deg,#0d9488,#0f766e)',color:'white'}}><div><h2 style={{fontSize:18,fontWeight:700}}>Weekly Report - Week {r.weekNo}</h2><p style={{fontSize:12,opacity:0.9}}>{r.docNo} | {proj?.name}</p></div><button onClick={()=>{setShowModal(null);setViewReportData(null);}} style={{background:'rgba(255,255,255,0.2)',border:'none',cursor:'pointer',padding:'6px 12px',borderRadius:6,color:'white'}}><Icons.X/></button></div>
        <div style={{padding:20,maxHeight:'75vh',overflowY:'auto'}}>
            <div style={{marginBottom:20}}><h4 style={{fontWeight:700,marginBottom:12,color:'#0f766e'}}>📋 General Information</h4><div className="grid-4" style={{gap:12}}><div style={{background:'#f8fafc',padding:12,borderRadius:8}}><p style={{fontSize:10,color:'#64748b'}}>Period</p><p style={{fontWeight:600,fontSize:13}}>{r.periodStart} - {r.periodEnd}</p></div><div style={{background:'#f8fafc',padding:12,borderRadius:8}}><p style={{fontSize:10,color:'#64748b'}}>Status</p><p><span className={`badge ${r.status==='Issued'?'badge-success':'badge-warning'}`}>{r.status}</span></p></div><div style={{background:'#f8fafc',padding:12,borderRadius:8}}><p style={{fontSize:10,color:'#64748b'}}>Prepared By</p><p style={{fontWeight:600,fontSize:13}}>{r.preparedBy||'-'}</p></div><div style={{background:'#f8fafc',padding:12,borderRadius:8}}><p style={{fontSize:10,color:'#64748b'}}>Checked By</p><p style={{fontWeight:600,fontSize:13}}>{r.checkedBy||'-'}</p></div></div></div>
            <div style={{marginBottom:20}}><h4 style={{fontWeight:700,marginBottom:12,color:'#3b82f6'}}>📊 Progress & EVM</h4><div className="grid-3" style={{gap:8,marginBottom:12}}><div style={{background:'#f8fafc',padding:10,borderRadius:8,textAlign:'center'}}><p style={{fontSize:9,color:'#64748b'}}>Plan</p><p style={{fontSize:16,fontWeight:700}}>{r.overallProgress?.plan?.toFixed(2)||0}%</p></div><div style={{background:'#f0fdf4',padding:10,borderRadius:8,textAlign:'center'}}><p style={{fontSize:9,color:'#64748b'}}>Actual</p><p style={{fontSize:16,fontWeight:700,color:'#16a34a'}}>{r.overallProgress?.actual?.toFixed(2)||0}%</p></div><div style={{background:(r.overallProgress?.variance||0)>=0?'#dcfce7':'#fee2e2',padding:10,borderRadius:8,textAlign:'center'}}><p style={{fontSize:9,color:'#64748b'}}>Variance</p><p style={{fontSize:16,fontWeight:700,color:(r.overallProgress?.variance||0)>=0?'#16a34a':'#dc2626'}}>{r.overallProgress?.variance?.toFixed(2)||0}%</p></div></div><div className="grid-4" style={{gap:8}}><div style={{background:(r.evm?.spiValue||1)>=1?'#dcfce7':'#fee2e2',padding:8,borderRadius:6,textAlign:'center'}}><p style={{fontSize:9,color:'#64748b'}}>SPI</p><p style={{fontSize:14,fontWeight:700}}>{r.evm?.spiValue?.toFixed(3)||'1.000'}</p></div><div style={{background:(r.evm?.cpiValue||1)>=1?'#dcfce7':'#fef3c7',padding:8,borderRadius:6,textAlign:'center'}}><p style={{fontSize:9,color:'#64748b'}}>CPI</p><p style={{fontSize:14,fontWeight:700}}>{r.evm?.cpiValue?.toFixed(2)||'1.00'}</p></div><div style={{background:'#f8fafc',padding:8,borderRadius:6,textAlign:'center'}}><p style={{fontSize:9,color:'#64748b'}}>EAC</p><p style={{fontSize:14,fontWeight:700}}>${((r.evm?.eac||0)/1e6).toFixed(1)}M</p></div><div style={{background:(r.evm?.vac||0)>=0?'#dcfce7':'#fee2e2',padding:8,borderRadius:6,textAlign:'center'}}><p style={{fontSize:9,color:'#64748b'}}>VAC</p><p style={{fontSize:14,fontWeight:700}}>${((r.evm?.vac||0)/1e6).toFixed(2)}M</p></div></div></div>
            <div style={{marginBottom:20}}><h4 style={{fontWeight:700,marginBottom:12,color:'#10b981'}}>Cash Flow</h4><div className="grid-4" style={{gap:12}}><div style={{background:'#f0fdf4',padding:12,borderRadius:8,textAlign:'center'}}><p style={{fontSize:10,color:'#64748b'}}>Revenue</p><p style={{fontSize:16,fontWeight:700,color:'#16a34a'}}>${((cf.revenue||0)/1e6).toFixed(2)}M</p></div><div style={{background:'#fee2e2',padding:12,borderRadius:8,textAlign:'center'}}><p style={{fontSize:10,color:'#64748b'}}>Cash Out</p><p style={{fontSize:16,fontWeight:700,color:'#dc2626'}}>${((cf.cashOut||0)/1e6).toFixed(2)}M</p></div><div style={{background:'#dbeafe',padding:12,borderRadius:8,textAlign:'center'}}><p style={{fontSize:10,color:'#64748b'}}>Billing</p><p style={{fontSize:16,fontWeight:700,color:'#2563eb'}}>${((cf.billing||0)/1e6).toFixed(2)}M</p></div><div style={{background:'#f3e8ff',padding:12,borderRadius:8,textAlign:'center'}}><p style={{fontSize:10,color:'#64748b'}}>Cash In</p><p style={{fontSize:16,fontWeight:700,color:'#7c3aed'}}>${((cf.cashIn||0)/1e6).toFixed(2)}M</p></div></div><div style={{marginTop:12,padding:12,background:cf.overallStatus==='green'?'#dcfce7':cf.overallStatus==='yellow'?'#fef3c7':'#fee2e2',borderRadius:8,textAlign:'center'}}><p style={{fontSize:12}}>Status: <strong>{cf.overallStatus==='green'?'🟢 Healthy':cf.overallStatus==='yellow'?'🟡 At Risk':'🔴 Critical'}</strong> (Score: {(cf.overallScore*100).toFixed(0)}%)</p></div></div>
            <div style={{marginBottom:20}}><h4 style={{fontWeight:700,marginBottom:12,color:'#6366f1'}}>📅 Milestones</h4><div className="grid-2" style={{gap:16}}><div><p style={{fontSize:11,fontWeight:600,marginBottom:8,color:'#0f766e'}}>Schedule Milestones</p><table className="table" style={{fontSize:11}}><thead><tr><th>#</th><th>Description</th><th>Plan</th><th>Actual/FC</th><th>Status</th></tr></thead><tbody>{(r.milestonesSchedule||[]).map((m,i)=>(<tr key={i}><td>{m.no}</td><td>{m.description}</td><td>{m.planDate||m.targetPlan||'-'}</td><td>{m.actualForecastDate||'-'}</td><td><span style={{background:m.status==='Completed'?'#dcfce7':m.status==='On Track'?'#fef3c7':'#fee2e2',color:m.status==='Completed'?'#16a34a':m.status==='On Track'?'#d97706':'#dc2626',padding:'2px 6px',borderRadius:999,fontSize:9,fontWeight:600}}>{m.status==='Completed'?'🟢':m.status==='On Track'?'🟡':'🔴'} {m.status}</span></td></tr>))}{(!r.milestonesSchedule||r.milestonesSchedule.length===0)&&<tr><td colSpan={5} style={{textAlign:'center',color:'#94a3b8'}}>No milestones</td></tr>}</tbody></table></div><div><p style={{fontSize:11,fontWeight:600,marginBottom:8,color:'#f59e0b'}}>Payment Milestones</p><table className="table" style={{fontSize:11}}><thead><tr><th>#</th><th>Description</th><th>Plan</th><th>Actual/FC</th><th>Status</th></tr></thead><tbody>{(r.milestonesPayment||[]).map((m,i)=>(<tr key={i}><td>{m.no}</td><td>{m.description}</td><td>{m.planDate||m.targetPlan||'-'}</td><td>{m.actualForecastDate||'-'}</td><td><span style={{background:m.status==='Completed'?'#dcfce7':m.status==='On Track'?'#fef3c7':'#fee2e2',color:m.status==='Completed'?'#16a34a':m.status==='On Track'?'#d97706':'#dc2626',padding:'2px 6px',borderRadius:999,fontSize:9,fontWeight:600}}>{m.status==='Completed'?'🟢':m.status==='On Track'?'🟡':'🔴'} {m.status}</span></td></tr>))}{(!r.milestonesPayment||r.milestonesPayment.length===0)&&<tr><td colSpan={5} style={{textAlign:'center',color:'#94a3b8'}}>No milestones</td></tr>}</tbody></table></div></div></div>
            <div><h4 style={{fontWeight:700,marginBottom:12,color:'#0891b2'}}>📋 Activities</h4><div className="grid-2" style={{gap:16}}><div style={{background:'#f0fdfa',padding:12,borderRadius:8}}><p style={{fontSize:11,fontWeight:600,marginBottom:8,color:'#0f766e'}}>This Week</p>{Object.entries(r.thisWeekActivities||{}).map(([cat,items])=>(<div key={cat} style={{marginBottom:8}}><p style={{fontWeight:600,fontSize:10,color:'#0f766e',textTransform:'capitalize'}}>{cat}</p><ul style={{paddingLeft:14,margin:0}}>{(Array.isArray(items)?items:[]).filter(i=>i).map((item,j)=><li key={j} style={{fontSize:11,color:'#475569'}}>{item}</li>)}</ul></div>))}</div><div style={{background:'#eff6ff',padding:12,borderRadius:8}}><p style={{fontSize:11,fontWeight:600,marginBottom:8,color:'#3b82f6'}}>Next Week Plan</p>{Object.entries(r.nextWeekPlan||{}).map(([cat,items])=>(<div key={cat} style={{marginBottom:8}}><p style={{fontWeight:600,fontSize:10,color:'#3b82f6',textTransform:'capitalize'}}>{cat}</p><ul style={{paddingLeft:14,margin:0}}>{(Array.isArray(items)?items:[]).filter(i=>i).map((item,j)=><li key={j} style={{fontSize:11,color:'#475569'}}>{item}</li>)}</ul></div>))}</div></div></div>
        </div>
        <div style={{padding:12,borderTop:'1px solid #e2e8f0',display:'flex',justifyContent:'flex-end',gap:8}}><button className="btn btn-secondary" onClick={()=>{setShowModal(null);setViewReportData(null);}}>Close</button><button className="btn btn-primary" onClick={()=>{setSelectedReportId(r.id);setActiveMenu('dashboard');setShowModal(null);setViewReportData(null);}}>Go to Dashboard</button></div></div></div>);
    };

    const renderProjectModal=()=>{
        const scheduleDuration=calculateScheduleDuration(formData.startDate,formData.finishDate);
        return(<div className="modal-overlay" onClick={()=>setShowModal(null)}><div className="modal" style={{maxWidth:900}} onClick={e=>e.stopPropagation()}><div style={{padding:16,borderBottom:'1px solid #e2e8f0'}}><h2 style={{fontSize:18,fontWeight:700}}>{editingId?'Edit':'Add'} Project</h2></div><div style={{padding:16,maxHeight:'70vh',overflowY:'auto'}}>
        <h4 style={{fontWeight:600,marginBottom:12,color:'#0f766e'}}>📋 Basic Information</h4>
        <div className="grid-2" style={{gap:12,marginBottom:16}}>
            <div style={{gridColumn:'span 2'}}><label className="label">Project Name</label><input className="input" value={formData.name||''} onChange={e=>setFormData({...formData,name:e.target.value})}/></div>
            <div><label className="label">Owner</label><input className="input" value={formData.owner||''} onChange={e=>setFormData({...formData,owner:e.target.value})}/></div>
            <div><label className="label">Contractor</label><input className="input" value={formData.contractor||''} onChange={e=>setFormData({...formData,contractor:e.target.value})}/></div>
            <div><label className="label">Technology Provider</label><input className="input" value={formData.technologyProvider||''} onChange={e=>setFormData({...formData,technologyProvider:e.target.value})}/></div>
            <div><label className="label">Contract Type</label><select className="select" value={formData.contractType||''} onChange={e=>setFormData({...formData,contractType:e.target.value})}><option value="">Select...</option><option value="EPC Turnkey">EPC Turnkey</option><option value="EPC Lumpsum">EPC Lumpsum</option><option value="EPCM">EPCM</option><option value="Design & Build">Design & Build</option></select></div>
        </div>
        
        <h4 style={{fontWeight:600,marginBottom:12,color:'#3b82f6'}}>💰 Contract & Payment</h4>
        <div className="grid-3" style={{gap:12,marginBottom:16}}>
            <div><label className="label">Contract Price (USD)</label><input className="input" type="number" value={formData.contractPrice||''} onChange={e=>setFormData({...formData,contractPrice:Number(e.target.value)})}/></div>
            <div><label className="label">BAC (USD)</label><input className="input" type="number" value={formData.bac||''} onChange={e=>setFormData({...formData,bac:Number(e.target.value)})}/></div>
            <div><label className="label">Term of Payment</label><select className="select" value={formData.termOfPayment||''} onChange={e=>setFormData({...formData,termOfPayment:e.target.value})}><option value="">Select...</option><option value="Progress Payment">Progress Payment</option><option value="Milestone">Milestone</option><option value="BOT">BOT</option><option value="Progress Payment & Milestone">Progress Payment & Milestone</option></select></div>
        </div>
        
        <h4 style={{fontWeight:600,marginBottom:12,color:'#dc2626'}}>⚠️ Liquidated Damages (LD)</h4>
        <div className="grid-2" style={{gap:12,marginBottom:16}}>
            <div><label className="label">LD Delay (USD/day)</label><input className="input" type="number" value={formData.ldDelay||''} onChange={e=>setFormData({...formData,ldDelay:Number(e.target.value)})} placeholder="e.g. 50000"/></div>
            <div><label className="label">LD Performance (USD/kW)</label><input className="input" type="number" value={formData.ldPerformance||''} onChange={e=>setFormData({...formData,ldPerformance:Number(e.target.value)})} placeholder="e.g. 100000"/></div>
        </div>
        
        <h4 style={{fontWeight:600,marginBottom:12,color:'#8b5cf6'}}>📅 Schedule</h4>
        <div className="grid-4" style={{gap:12,marginBottom:16}}>
            <div><label className="label">Start Date</label><input className="input" type="date" value={formData.startDate||''} onChange={e=>setFormData({...formData,startDate:e.target.value})}/></div>
            <div><label className="label">Finish Date</label><input className="input" type="date" value={formData.finishDate||''} onChange={e=>setFormData({...formData,finishDate:e.target.value})}/></div>
            <div><label className="label">NTP Date</label><input className="input" type="date" value={formData.ntpDate||''} onChange={e=>setFormData({...formData,ntpDate:e.target.value})}/></div>
            <div><label className="label">COD Date</label><input className="input" type="date" value={formData.codDate||''} onChange={e=>setFormData({...formData,codDate:e.target.value})}/></div>
        </div>
        <div className="grid-2" style={{gap:12,marginBottom:16}}>
            <div style={{background:'#f0fdf4',padding:12,borderRadius:8}}><label className="label" style={{color:'#16a34a'}}>Schedule Duration (Auto)</label><input className="input auto-calc" disabled value={`${scheduleDuration} days`}/></div>
            <div><label className="label">Guaranteed Net Power Output (MW)</label><input className="input" type="number" step="0.1" value={formData.guaranteedPower||''} onChange={e=>setFormData({...formData,guaranteedPower:Number(e.target.value)})} placeholder="e.g. 45"/></div>
        </div>
        
        <h4 style={{fontWeight:600,marginBottom:12,color:'#f59e0b'}}>📝 Scope</h4>
        <div style={{marginBottom:16}}><label className="label">Scope by Owner</label><textarea className="input" style={{minHeight:80}} value={formData.scopeByOwner||''} onChange={e=>setFormData({...formData,scopeByOwner:e.target.value})} placeholder="e.g. Site preparation, access road, temporary facilities..."/></div>
        
        </div><div style={{padding:12,borderTop:'1px solid #e2e8f0',display:'flex',justifyContent:'flex-end',gap:8}}><button className="btn btn-secondary" onClick={()=>setShowModal(null)}>Cancel</button><button className="btn btn-primary" onClick={saveProject}><Icons.Save/> Save</button></div></div></div>);
    };

    return(<div style={{display:'flex',minHeight:'100vh'}}><div className={`sidebar ${sidebarCollapsed?'collapsed':''}`}><div style={{display:'flex',alignItems:'center',gap:10,marginBottom:24,paddingLeft:4}}><div style={{width:36,height:36,background:'rgba(255,255,255,0.2)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}><Icons.Chart/></div><span className="sidebar-text" style={{fontWeight:700,fontSize:13,color:'white',letterSpacing:'-0.01em'}}>EPC Dashboard v5</span></div><nav>{[{id:'dashboard',icon:<Icons.Dashboard/>,label:'Dashboard'},{id:'projects',icon:<Icons.Project/>,label:'Projects'},{id:'reports',icon:<Icons.Report/>,label:'Weekly Reports'},{id:'scurve',icon:<Icons.Chart/>,label:'S-Curve & QR'},{id:'analysis',icon:<Icons.Analysis/>,label:'Risk Analysis'},{id:'data',icon:<Icons.Database/>,label:'Data Mgmt'}].map(item=>(<div key={item.id} className={`nav-item ${activeMenu===item.id?'active':''}`} onClick={()=>setActiveMenu(item.id)}>{item.icon}<span className="sidebar-text">{item.label}</span></div>))}</nav><div style={{position:'absolute',bottom:20,left:12,right:12}}><div className="nav-item" onClick={()=>setSidebarCollapsed(!sidebarCollapsed)}><Icons.Menu/><span className="sidebar-text">Collapse</span></div></div></div><div className={`main-content ${sidebarCollapsed?'expanded':''}`}>
<div style={{position:'sticky',top:0,zIndex:50,background:'white',borderBottom:'1px solid #e2e8f0',padding:'10px 20px',marginLeft:-20,marginRight:-20,marginTop:-20,marginBottom:16,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap',boxShadow:'0 1px 2px rgba(15,23,42,0.04)'}}>
<div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
<CloudBadge status={cloudStatus} lastSync={lastSync}/>
<span style={{fontSize:11,color:'#64748b'}}>
{SheetsService.isConfigured()?`${projects.length}P / ${reports.length}R`:'Offline mode'}
{lastSync&&` • Last: ${lastSync}`}
</span>
</div>
<div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
<button
className="btn btn-primary btn-sm"
disabled={!SheetsService.isConfigured()||syncInProgress}
onClick={pullFromSheets}
style={{display:'flex',alignItems:'center',gap:6,opacity:(!SheetsService.isConfigured()||syncInProgress)?0.5:1}}
title="Load data dari Google Sheets (overwrite local)">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
{syncInProgress?'Loading...':'Load from Sheets'}
</button>
<button
className="btn btn-secondary btn-sm"
disabled={!SheetsService.isConfigured()||syncInProgress}
onClick={pushToSheets}
style={{display:'flex',alignItems:'center',gap:6,opacity:(!SheetsService.isConfigured()||syncInProgress)?0.5:1}}
title="Push semua data ke Google Sheets (overwrite sheets)">
<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
{syncInProgress?'Pushing...':'Push to Sheets'}
</button>
</div>
</div>
{activeMenu==='dashboard'&&renderDashboard()}{activeMenu==='projects'&&renderProjects()}{activeMenu==='reports'&&renderReports()}{activeMenu==='scurve'&&renderSCurve()}{activeMenu==='analysis'&&renderAnalysis()}{activeMenu==='data'&&renderDataMgmt()}</div>{showModal==='project'&&renderProjectModal()}{showModal==='report'&&renderReportModal()}{showModal==='viewReport'&&renderViewReportModal()}{imageViewer&&<div className="modal-overlay" style={{background:'rgba(0,0,0,0.9)'}} onClick={()=>setImageViewer(null)}><div style={{position:'relative',maxWidth:'90vw',maxHeight:'90vh'}}><div style={{position:'absolute',top:-36,left:0,right:0,display:'flex',justifyContent:'space-between',alignItems:'center'}}><h3 style={{color:'white',fontWeight:600,fontSize:13}}>{imageViewer.title}</h3><button onClick={()=>setImageViewer(null)} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:6,padding:'4px 10px',color:'white',cursor:'pointer',fontSize:11}}>✕ Close</button></div><img src={imageViewer.src} alt={imageViewer.title} style={{maxWidth:'90vw',maxHeight:'85vh',objectFit:'contain',borderRadius:8}} onClick={e=>e.stopPropagation()}/></div></div>}{notification&&<div className="toast" style={{background:notification.type==='error'?'#dc2626':'#0f766e'}}><Icons.Check/>{notification.msg}</div>}</div>);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
